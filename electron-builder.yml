appId: com.claro.app
productName: CLARO
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
